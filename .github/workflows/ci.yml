name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      # Playwright browsers aren't needed for unit tests (integration tests that
      # require Xandikos are skipped without XANDIKOS_URL).
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Type-check & build (tsc -b)
        run: pnpm run build
      - name: Build web dashboard
        run: pnpm --filter @todomd/web-dashboard run build
      - name: Test
        run: pnpm run test
